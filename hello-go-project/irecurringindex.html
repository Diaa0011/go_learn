<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyFatoorah Recurring | Load Session Mode</title>
    <script src="https://demo.myfatoorah.com/payment/v1/session.js"></script>

    <style>
        :root { 
            --primary: #8b5cf6; --secondary: #10b981; --bg: #f8fafc; --panel-bg: #ffffff;
            --card-bg: #ffffff; --text-main: #0f172a; --text-muted: #64748b;
            --border: #e2e8f0; --json-bg: #1e293b;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .panel { flex: 1; display: flex; flex-direction: column; padding: 30px; box-sizing: border-box; overflow-y: auto; }
        .left-panel { background: var(--panel-bg); border-right: 1px solid var(--border); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-top: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        input, select { background: var(--bg); border: 1px solid var(--border); padding: 10px; border-radius: 6px; color: var(--text-main); font-family: inherit; }
        .btn { cursor: pointer; border: none; border-radius: 8px; font-weight: 600; padding: 12px; transition: 0.2s; font-size: 14px; margin-bottom: 5px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-secondary { background: var(--secondary); color: white; width: 100%; }
        .btn-cors { background: #ef4444; color: white; padding: 8px; font-size: 11px; margin-bottom: 15px; width: 100%; }
        #embedded-payment-container { min-height: 320px; margin-top: 20px; border: 1px dashed var(--border); border-radius: 8px; padding: 10px; background: #fff; position: relative; }
        pre { background: var(--json-bg); padding: 15px; border-radius: 8px; font-size: 11px; color: #e2e8f0; overflow-x: auto; border: 1px solid var(--border); margin: 0; }
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; background: #ede9fe; color: #6d28d9; }
        .key { color: #a5b4fc; } .string { color: #34d399; } .number { color: #fbbf24; }
        #logViewer { max-height: 200px; font-family: monospace; font-size: 12px; }
        .divider { text-align: center; margin: 15px 0; font-size: 10px; color: var(--text-muted); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="panel left-panel">
        <div class="section-header">
            <h2>Payment Setup</h2>
            <span class="badge">v2 DASHBOARD</span>
        </div>

        <button class="btn btn-cors" onclick="window.open('https://cors-anywhere.herokuapp.com/corsdemo', '_blank')">
            1. Activate CORS Proxy
        </button>
        
        <div class="card">
            <div class="input-group">
                <label>Amount (KWD)</label>
                <input type="number" id="invAmount" value="10">
            </div>
            <div class="input-group">
                <label>Customer Name</label>
                <input type="text" id="custName" value="John Doe">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex:1">
                    <label>Phone</label>
                    <input type="text" id="custPhone" value="12345678">
                </div>
                <div class="input-group" style="flex:1">
                    <label>Email</label>
                    <input type="email" id="custEmail" value="john@example.com">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="input-group">
                <label>Manual Session ID (Optional)</label>
                <input type="text" id="manualSessionId" placeholder="Paste Session A here...">
            </div>
            <button class="btn btn-secondary" onclick="loadManualSession()">2a. Load Existing Session</button>
            
            <div class="divider">OR</div>

            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex:1">
                    <label>Interval (Days)</label>
                    <input type="number" id="intDays" value="1">
                </div>
                <div class="input-group" style="flex:1">
                    <label>Iterations</label>
                    <input type="number" id="iter" value="4">
                </div>
            </div>
            <button id="genBtn" class="btn btn-primary" onclick="initiateRecurringSession()">2b. Create New Session</button>
        </div>

        <div id="embedded-payment-container">
            <div id="mf-ui-placeholder" style="text-align:center; color:var(--text-muted); margin-top: 130px; font-size: 14px;">
                Form will load after Session is provided
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="section-header"><h2>3. Final Execute Payload</h2></div>
        <p style="font-size: 12px; color: var(--text-muted);">Use THIS JSON in your <b>/ExecutePayment</b> request:</p>
        <pre id="payloadViewer">// New SessionId (Session B) will appear here...</pre>

        <div class="section-header"><h2>Debug Logs</h2></div>
        <pre id="logViewer">// System Logs...</pre>
    </div>

<script>
    // --- START: CACHE CLEARANCE ---
    // Clears MyFatoorah SDK identifiers to prevent Session A/B overlap
    (function clearMFCache() {
        console.log("Pre-run cleanup: Removing mf_session_id from storage...");
        localStorage.removeItem('mf_session_id');
        sessionStorage.removeItem('mf_session_id');
        // Clear any other keys that might start with mf
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.toLowerCase().includes('mf')) localStorage.removeItem(key);
        }
    })();
    // --- END: CACHE CLEARANCE ---

    const API_TOKEN = "SK_KWT_Uw42KMHRKdVNZLHC4KEBTkHxOMfVsQi4txBkvQ1A1iAbVDdfPRhFsMQLVLkLXY3S";
    const PROXY = "https://cors-anywhere.herokuapp.com/"; 
    const BASE_URL = "https://apitest.myfatoorah.com/v2/";

    function log(msg, isError = false) {
        const viewer = document.getElementById('logViewer');
        const color = isError ? "#f87171" : "#34d399";
        viewer.innerHTML += `> <span style="color:${color}">${msg}</span>\n`;
        viewer.scrollTop = viewer.scrollHeight;
    }

    function loadManualSession() {
        const sid = document.getElementById('manualSessionId').value.trim();
        if(!sid) return alert("Please enter a Session ID");
        
        log("Loading manual Session A: " + sid);
        document.getElementById('mf-ui-placeholder').style.display = 'none';
        renderEmbeddedForm(sid, "KWT"); 
    }

    async function initiateRecurringSession() {
        log("Calling v2/InitiateSession (Session A)...");
        try {
            const response = await fetch(PROXY + BASE_URL + "InitiateSession", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${API_TOKEN}`,
                    "Content-Type": "application/json",
                    "X-Requested-With": "XMLHttpRequest"
                },
                body: JSON.stringify({ 
                    "PaymentMethodId": 2,
                    "CustomerIdentifier": "Diaa_Dev_Backend",
                    "IsRecurring": true 
                })
            });

            const result = await response.json();
            
            if(result.IsSuccess) {
                log("Session A Created: " + result.Data.SessionId);
                document.getElementById('mf-ui-placeholder').style.display = 'none';
                renderEmbeddedForm(result.Data.SessionId, result.Data.CountryCode);
            } else {
                log("Error: " + result.Message, true);
            }
        } catch (err) {
            log("Proxy Error. Ensure CORS anywhere is active.", true);
        }
    }

    function renderEmbeddedForm(sid, country) {
        log("Initializing MyFatoorah UI (Forcing fresh Session B)...");
        
        // Ensure the container is empty before re-init
        document.getElementById('embedded-payment-container').innerHTML = '';

        myfatoorah.init({
            sessionId: sid,
            countryCode: country,
            currencyCode: "KWD",
            amount: document.getElementById('invAmount').value,
            containerId: "embedded-payment-container",
            callback: (response) => {
                if(response.isSuccess) {
                    log("SUCCESS! Card Tokenized.");
                    log("New Session B: " + response.sessionId);
                    prepareBackendPayload(response.sessionId, sid);
                } else {
                    log("Card Error: " + JSON.stringify(response), true);
                }
            }
        });
    }

    function prepareBackendPayload(sessionB, sessionA) {
        const payload = {
            "OriginalSessionID": sessionA, // Added to help backend find the record
            "SessionId": sessionB,
            "InvoiceValue": parseFloat(document.getElementById('invAmount').value),
            "RecurringModel": {
                "RecurringType": "CUSTOM",
                "IntervalDays": parseInt(document.getElementById('intDays').value) || 1,
                "Iteration": parseInt(document.getElementById('iter').value) || 1,
                "RetryCount": 3
            },
            "CustomerName": document.getElementById('custName').value,
            "CustomerMobile": document.getElementById('custPhone').value,
            "CustomerEmail": document.getElementById('custEmail').value,
            "MobileCountryCode": "20"
        };

        document.getElementById('payloadViewer').innerHTML = syntaxHighlight(payload);
        log("PAYLOAD READY. POST this to your /UpdateSessionToTokenized endpoint.");
    }

    function syntaxHighlight(json) {
        if (typeof json != 'string') json = JSON.stringify(json, undefined, 4);
        return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g, function (match) {
            var cls = 'number';
            if (/^"/.test(match)) {
                if (/:$/.test(match)) cls = 'key'; else cls = 'string';
            }
            return '<span class="' + cls + '">' + match + '</span>';
        });
    }
</script>
</body>
</html>
